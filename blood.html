<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일반인 맞춤형 4단 구조 - 혈액형 분석기</title>
    <style>
        /* 설계안을 시각적으로 깔끔하게 보여주기 위한 기본 스타일링 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f6f7;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }
        button {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        /* 각 혈액형 버튼 색상 테마 */
        .btn-a { background-color: #ff6b6b; color: white; }
        .btn-b { background-color: #4dadf7; color: white; }
        .btn-o { background-color: #51cf66; color: white; }
        .btn-ab { background-color: #cc5de8; color: white; }
        button:hover {
            opacity: 0.85;
            transform: translateY(-2px);
        }
        .result-box {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            line-height: 1.6;
            color: #495057;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🩸 혈액형 성향 분석기</h1>
        <p style="color: #868e96; margin-bottom: 20px;">자신의 혈액형을 선택하면 백엔드 서버에서 분석 데이터를 가져옵니다.</p>
        
        <!-- 1. 사용자가 클릭할 혈액형 버튼 그룹 (이벤트 연결) -->
        <div class="btn-group">
            <button class="btn-a" onclick="fetchBloodAnalysis('A')">A형</button>
            <button class="btn-b" onclick="fetchBloodAnalysis('B') font-weight">B형</button>
            <button class="btn-o" onclick="fetchBloodAnalysis('O')">O형</button>
            <button class="btn-ab" onclick="fetchBloodAnalysis('AB')">AB형</button>
        </div>

        <!-- 2. 백엔드에서 받아온 분석 결과가 출력될 구역 -->
        <div class="result-box" id="result-area">
            혈액형 버튼을 누르면 실시간 분석 결과가 여기에 표시됩니다.
        </div>
    </div>

    <!-- 3. 시스템 연산을 담당할 백엔드 통신 자바스크립트 소스코드 -->
    <script>
        // 백엔드 API와 통신하여 결과를 화면에 주입하는 함수
        async function fetchBloodAnalysis(selectedBloodType) {
            const resultArea = document.getElementById('result-area');
            
            // 사용자가 지루하지 않게 로딩 상태를 표시해 줍니다.
            resultArea.innerText = '백엔드 엔진에서 성향 분석 중... ⚙️';

            try {
                // 우리가 설계한 로컬 자바 백엔드 서버 주소로 요청 전송 (GET 방식)
                const response = await fetch(`http://localhost:8080/api/blood?bloodType=${selectedBloodType}`);
                
                if (!response.ok) {
                    throw new Error('서ver 응답에 실패했습니다.');
                }

                // 백엔드가 던져준 표준 JSON 데이터를 파싱
                const data = await response.json();
                
                // 화면의 result-box 영역에 백엔드가 계산한 비즈니스 로직 결과 반영
                resultArea.innerHTML = `<strong>[${data.bloodType}형 분석 결과]</strong><br>${data.result}`;

            } catch (error) {
                console.error('통신 실패 오류 내용:', error);
                resultArea.innerHTML = '<span style="color: #e03131; font-weight: bold;">⚠️ 백엔드 서버(Port: 8080)가 켜져 있지 않습니다.<br>자바 서버를 구동한 후 다시 시도해 주세요.</span>';
            }
        }
    </script>
</body>
</html>
